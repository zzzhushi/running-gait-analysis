<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>GaitLab — Running Gait Analysis</title>
  <link rel="stylesheet" href="./css/app.css" />
  <style>
    /* MVP static build: keep the code in place but hide surfaces not yet wired
       (Library / Trends / Combine / user switcher). main.js sets body.static. */
    body.static .topnav a[data-nav="#/library"],
    body.static .topnav a[data-nav="#/trends"],
    body.static .topnav a[data-nav="#/combine"],
    body.static #user-area { display: none; }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="brand" data-nav="#/library">
      <span class="brand-mark">⏱</span>
      <span class="brand-name">GaitLab</span>
      <span class="brand-tag">running gait analysis</span>
    </div>
    <nav class="topnav">
      <a data-nav="#/library">Library</a>
      <a data-nav="#/trends">Trends</a>
      <a data-nav="#/combine">Combine</a>
      <div id="user-area"></div>
      <a class="btn btn-accent" data-nav="#/upload">+ New analysis</a>
    </nav>
  </header>

  <main id="app"><div class="loading">Loading…</div></main>

  <footer class="foot">
    Runs entirely in your browser · no account, no upload · pose by MediaPipe (in-browser)
  </footer>

  <script type="module" src="./js/main.js"></script>
</body>
</html>
