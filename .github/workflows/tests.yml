name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # The engine + test suite are zero-third-party-dep; only dev/test tools are installed.
      - name: Install dev dependencies
        run: pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest

      - name: Spec docs in sync with the code registry
        run: python scripts/gen_spec.py --check
