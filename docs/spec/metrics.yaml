composites:
  bouncing:
    view: side
    all_of: [vertical_oscillation > warn_hi, cadence < good_lo]
    severity: high
    supersedes: [vertical_oscillation, cadence]
  heavy_heelstrike:
    view: side
    all_of: [foot_strike_angle > 12, overstride > good_hi]
    severity: med
    supersedes: [foot_strike_angle]
  overstriding:
    view: side
    all_of: [overstride > good_hi, hip_extension < good_lo, cadence < good_lo]
    severity: high
    supersedes: [overstride, hip_extension, cadence]
  sinking_midstance:
    view: side
    all_of: [knee_flexion_midstance > good_hi, trunk_lean > warn_hi]
    severity: high
    supersedes: [knee_flexion_midstance, trunk_lean]
